name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  buildAndTest:
    name: Run tests and code quality
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the Git repository
        uses: actions/checkout@v4

      - name: Set up Java toolchain
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Combines tests to execute only once, generating both results and coverage reports
      - name: Run all tests and coverage
        run: ./gradlew --no-daemon test jacocoTestReport

      - name: Build artifact
        run: ./gradlew --no-daemon bootJar

  security-analysis:
    name: Scorecard analysis
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true # Set to false if this repository is PRIVATE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: scorecards

  backend-analysis:
    name: backend-analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ONLY runs spotbugsMain (compiled classes) and jacocoTestReport to optimize time
      - name: Analyze backend
        run: ./gradlew --no-daemon spotbugsMain jacocoTestReport

      - name: Upload SpotBugs SARIF
        if: ${{ always() && hashFiles('build/reports/spotbugs/main.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/build/reports/spotbugs/main.sarif
          category: spotbugs-backend

      - name: JaCoCo PR Report
        if: github.event_name == 'pull_request'
        uses: Madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          title: Backend Test Coverage

  frontend-analysis:
    name: frontend-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Frontend analysis not applicable for standalone backend service
        run: echo "No frontend module in this repository; skipping frontend analysis."

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: SonarCloud analysis with coverage
        run: ./gradlew clean test jacocoTestReport sonar --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

  dummy-deploy:
    name: dummy-deploy
    # Quality Gate: Require BOTH testing and static analysis to pass successfully
    needs: [buildAndTest, backend-analysis]
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check Quality Gate
        run: echo "Quality Gate Passed! Tests and linter are clean."

      - name: Simulate Deployment to Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          echo "Simulating deployment to STAGING Environment..."
          echo "Connecting to Server... [MOCK]"
          echo "Deployment Success!"

      - name: Simulate Deployment to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Simulating deployment to PRODUCTION Environment..."
          echo "Connecting to Server... [MOCK]"
          echo "Deployment Success!"
