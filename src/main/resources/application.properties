spring.application.name=be-management-autentikasi
server.port=${SERVER_PORT:8080}

# PostgreSQL Database Configuration (default runtime)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:auth_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:auth_pass}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.h2.console.enabled=false

# Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
jwt.secret=${JWT_SECRET:thisIsMysecregtfrdesww233eggtffeeddgkjjhhtdhttebd54ndhdhfhhhshs8877465sbbdd}
jwt.expiration=${JWT_EXPIRATION:3600000}

app.internal-service-token=${DEV_INTERNAL_TOKEN:dev-internal-token}
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

